<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Viewer</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const STORAGE_KEY = "map-pin-dropper-pins";

    const redMarkerIcon = L.icon({
      iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
      shadowUrl: "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png",
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    const greenMarkerIcon = L.icon({
      iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
      shadowUrl: "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png",
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    const map = L.map("map", {
      zoomControl: true,
      attributionControl: false
    }).setView([20, 0], 2);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    function getMarkerIcon(pin) {
      return pin.status === "accepted" ? greenMarkerIcon : redMarkerIcon;
    }

    function isValidPin(pin) {
      return (
        pin &&
        typeof pin.lat === "number" &&
        typeof pin.lng === "number" &&
        pin.lat >= -90 &&
        pin.lat <= 90 &&
        pin.lng >= -180 &&
        pin.lng <= 180
      );
    }

    function loadPins() {
      const savedPins = localStorage.getItem(STORAGE_KEY);

      if (!savedPins) {
        return;
      }

      try {
        const parsedPins = JSON.parse(savedPins);

        if (!Array.isArray(parsedPins)) {
          return;
        }

        parsedPins.forEach((pin) => {
          if (!isValidPin(pin)) {
            return;
          }

          L.marker([pin.lat, pin.lng], {
            icon: getMarkerIcon(pin)
          }).addTo(map);
        });
      } catch (error) {
        console.error("Unable to load saved pins:", error);
      }
    }

    loadPins();
  </script>
</body>
</html>
