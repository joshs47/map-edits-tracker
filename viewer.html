<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Viewer</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"
  >
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"
  >
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      position: relative;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .pin-counter {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 500;
      padding: 10px 14px;
      border: 1px solid #d8e1ec;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      color: #1f2937;
      font-size: 0.95rem;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    }

    .reset-zoom-button {
      position: absolute;
      top: 78px;
      left: 16px;
      z-index: 500;
      padding: 10px 14px;
      border: 1px solid #d8e1ec;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      color: #1f2937;
      font-size: 0.95rem;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      cursor: pointer;
    }

    .reset-zoom-button:hover {
      background: #ffffff;
    }

    .leaderboard-link {
      position: absolute;
      top: 140px;
      left: 16px;
      z-index: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border: 1px solid #d8e1ec;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      color: #1f2937;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    }

    .leaderboard-link:hover {
      background: #ffffff;
    }

    .leaflet-popup-content-wrapper {
      padding: 0;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.18);
    }

    .leaflet-popup-content {
      margin: 0;
    }

    .leaflet-popup-tip {
      background: #ffffff;
    }

    .leaflet-container a.leaflet-popup-close-button {
      top: 10px;
      right: 12px;
      width: 28px;
      height: 28px;
      color: #6b7280;
      font-size: 34px;
      line-height: 24px;
    }
  </style>
</head>
<body>
  <div id="acceptedPinsCounter" class="pin-counter">Accepted Pins: 0</div>
  <button id="resetZoomButton" class="reset-zoom-button" type="button">Reset Zoom</button>
  <a class="leaderboard-link" href="leaderboard.html">View Leaderboard</a>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
  <script>
    const pinsDataUrl = "https://joshs47.github.io/map-edits-tracker/pins.json";
    const acceptedPinsCounter = document.getElementById("acceptedPinsCounter");
    const resetZoomButton = document.getElementById("resetZoomButton");
    const defaultCenter = [20, 0];
    const defaultZoom = 2;

    const greenMarkerIcon = L.icon({
      iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
      shadowUrl: "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png",
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    const map = L.map("map", {
      zoomControl: false,
      attributionControl: false
    }).setView(defaultCenter, defaultZoom);

    const clusterGroup = L.markerClusterGroup({
      chunkedLoading: true
    });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);
    map.addLayer(clusterGroup);

    function isValidPin(pin) {
      return (
        pin &&
        typeof pin.lat === "number" &&
        typeof pin.lng === "number" &&
        pin.lat >= -90 &&
        pin.lat <= 90 &&
        pin.lng >= -180 &&
        pin.lng <= 180
      );
    }

    function updateAcceptedCounter(count) {
      acceptedPinsCounter.textContent = `Accepted Pins: ${count}`;
    }

    function formatCoordinate(value) {
      return Number(value).toFixed(4);
    }

    function createPopupContent(pin) {
      const country = pin.country || "Unknown";
      const lat = formatCoordinate(pin.lat);
      const lng = formatCoordinate(pin.lng);
      const googleMapsUrl = `https://www.google.com/maps?q=${pin.lat},${pin.lng}`;

      return `
        <div style="width: 390px; padding: 22px 24px 24px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #2d3748; background: #ffffff; border-radius: 24px;">
          <p style="margin: 0 0 18px; font-size: 29px; line-height: 1.28; color: #2d3748;">
            <strong style="font-weight: 800;">Latitude:</strong> ${lat}
          </p>
          <p style="margin: 0 0 18px; font-size: 29px; line-height: 1.28; color: #2d3748;">
            <strong style="font-weight: 800;">Longitude:</strong> ${lng}
          </p>
          <p style="margin: 0 0 28px; font-size: 29px; line-height: 1.28; color: #2d3748;">
            <strong style="font-weight: 800;">Country:</strong> ${country}
          </p>
          <a
            href="${googleMapsUrl}"
            target="_blank"
            rel="noopener noreferrer"
            style="display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 18px 20px; border-radius: 20px; background: #3f63dd; color: #ffffff; text-decoration: none; font-size: 24px; font-weight: 800; line-height: 1.2; box-sizing: border-box;"
          >
            <span style="font-size: 28px; line-height: 1;">🌍</span>
            <span>Open in Google Maps</span>
          </a>
        </div>
      `;
    }

    function loadPins() {
      fetch(pinsDataUrl, {
        method: "GET"
      })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Unable to load ${pinsDataUrl} (${response.status})`);
          }

          return response.text();
        })
        .then((text) => {
          if (!text.trim()) {
            return [];
          }

          const parsedPins = JSON.parse(text);
          return Array.isArray(parsedPins) ? parsedPins : [];
        })
        .then((pins) => {
          console.log("Loaded live pins data for viewer:", pins);
          const acceptedPins = pins.filter((pin) => isValidPin(pin) && pin.status === "accepted");

          acceptedPins.forEach((pin) => {
            const marker = L.marker([pin.lat, pin.lng], {
              icon: greenMarkerIcon
            }).bindPopup(createPopupContent(pin), {
              maxWidth: 430,
              className: "accepted-pin-popup"
            });

            clusterGroup.addLayer(marker);
          });

          updateAcceptedCounter(acceptedPins.length);
        })
        .catch((error) => {
          console.error("Error loading live pins data:", error);
          updateAcceptedCounter(0);
        });
    }

    resetZoomButton.addEventListener("click", () => {
      map.setView(defaultCenter, defaultZoom);
    });

    loadPins();
  </script>
</body>
</html>
