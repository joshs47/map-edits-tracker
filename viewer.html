<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Viewer</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"
  >
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"
  >
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      position: relative;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .pin-counter {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 500;
      padding: 10px 14px;
      border: 1px solid #d8e1ec;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      color: #1f2937;
      font-size: 0.95rem;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    }
  </style>
</head>
<body>
  <div id="acceptedPinsCounter" class="pin-counter">Accepted Pins: 0</div>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
  <script>
    const acceptedPinsCounter = document.getElementById("acceptedPinsCounter");

    const greenMarkerIcon = L.icon({
      iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
      shadowUrl: "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png",
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    const map = L.map("map", {
      zoomControl: true,
      attributionControl: false
    }).setView([20, 0], 2);

    const clusterGroup = L.markerClusterGroup({
      chunkedLoading: true
    });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);
    map.addLayer(clusterGroup);

    function isValidPin(pin) {
      return (
        pin &&
        typeof pin.lat === "number" &&
        typeof pin.lng === "number" &&
        pin.lat >= -90 &&
        pin.lat <= 90 &&
        pin.lng >= -180 &&
        pin.lng <= 180
      );
    }

    function updateAcceptedCounter(count) {
      acceptedPinsCounter.textContent = `Accepted Pins: ${count}`;
    }

    function formatCoordinate(value) {
      return Number(value).toFixed(4);
    }

    function createPopupContent(pin) {
      const country = pin.country || "Unknown";
      const lat = formatCoordinate(pin.lat);
      const lng = formatCoordinate(pin.lng);
      const googleMapsUrl = `https://www.google.com/maps?q=${pin.lat},${pin.lng}`;

      return `
        <div>
          <p><strong>${country}</strong></p>
          <p>Lat: ${lat}</p>
          <p>Lng: ${lng}</p>
          <p><a href="${googleMapsUrl}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a></p>
        </div>
      `;
    }

    function loadPins() {
      fetch("pins.json")
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Unable to load pins.json (${response.status})`);
          }

          return response.text();
        })
        .then((text) => {
          if (!text.trim()) {
            return [];
          }

          const parsedPins = JSON.parse(text);
          return Array.isArray(parsedPins) ? parsedPins : [];
        })
        .then((pins) => {
          const acceptedPins = pins.filter((pin) => isValidPin(pin) && pin.status === "accepted");

          acceptedPins.forEach((pin) => {
            const marker = L.marker([pin.lat, pin.lng], {
              icon: greenMarkerIcon
            }).bindPopup(createPopupContent(pin));

            clusterGroup.addLayer(marker);
          });

          updateAcceptedCounter(acceptedPins.length);
        })
        .catch((error) => {
          console.error("Error loading pins.json:", error);
          updateAcceptedCounter(0);
        });
    }

    loadPins();
  </script>
</body>
</html>
